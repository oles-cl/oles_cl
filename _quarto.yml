project:
  type: website
  output-dir: docs
  pre-render: compilar_publicaciones_perfiles.R
  resources:
    - images/logos/*.mp4
    - images/logos/*.mov

website:
  title: ""
  favicon: images/logos/icon.png
  navbar:
    logo: images/logos/logo2.png
    title: false
    background: dark
    left:
      - text: "Inicio"
        href: index.qmd
      - text: "Acerca de OLES"
        href: somos.qmd
      - text: "Noticias"
        href: noticias/index.qmd
      - text: "Investigación"
        menu:
          - text: "Proyectos de Investigación"
            href: estudios/index.qmd
          - text: "Líneas de investigación"
            href: estudios/lineas.qmd
          - text: "---"
          - text: "Publicaciones Académicas"
            href: publicaciones/index.qmd
      - text: "Repositorio de datos"
        menu:
          - text: "EPSEP"
            href: repositorio/epsep.qmd
      - text: "Equipo"
        href: equipo/index.qmd
      - text: "Contacto"
        href: contacto.qmd

execute:
  echo: false
  warning: false
  message: false

format:
  html:
    theme: cosmo
    css: styles.css
    lang: es
    include-in-header:
      - text: |
          <script src="translations.js" defer></script>
    include-after-body:
      - text: |
          <script>
          document.addEventListener('DOMContentLoaded', function() {
            var v = document.querySelector('.hero-video');
            if (v) v.playbackRate = 0.6;
          });
          </script>
